name: Code Scan
# Building block: Stage 1 — Code Analysis
# Runs Trivy filesystem scan for vulnerabilities, secrets, and misconfigurations.
# Emits: pipeline-meta-code-scan artifact containing the native Trivy JSON output.

on:
  workflow_call:
    inputs:
      scanners:
        description: 'Trivy scanners to enable (comma-separated)'
        required: false
        type: string
        default: 'vuln,secret,misconfig'
      severity:
        description: 'Severity levels to include (comma-separated)'
        required: false
        type: string
        default: 'HIGH,CRITICAL'
      ignore-unfixed:
        description: 'Ignore vulnerabilities without a fix'
        required: false
        type: boolean
        default: false
      exit-code:
        description: 'Exit code when issues are found (0 = report only, 1 = fail)'
        required: false
        type: number
        default: 1
      working-directory:
        description: 'Directory to scan (relative to repo root)'
        required: false
        type: string
        default: '.'
      trivy-version:
        description: 'Pinned Trivy image version'
        required: false
        type: string
        default: '0.58.1'
      upload-sarif:
        description: 'Upload SARIF results to GitHub Security tab'
        required: false
        type: boolean
        default: true
      runs-on:
        description: 'Runner label'
        required: false
        type: string
        default: 'ubuntu-24.04'

    outputs:
      status:
        description: 'Scan result: passed or failed'
        value: ${{ jobs.scan.outputs.status }}
      critical-count:
        description: 'Number of CRITICAL severity findings'
        value: ${{ jobs.scan.outputs.critical-count }}
      high-count:
        description: 'Number of HIGH severity findings'
        value: ${{ jobs.scan.outputs.high-count }}

jobs:
  scan:
    name: Code Scan (Trivy)
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      security-events: write  # for SARIF upload
    outputs:
      status: ${{ steps.result.outputs.status }}
      critical-count: ${{ steps.trivy.outputs.critical }}
      high-count: ${{ steps.trivy.outputs.high }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        id: trivy
        env:
          WORKING_DIR: ${{ inputs.working-directory }}
          SCANNERS: ${{ inputs.scanners }}
          SEVERITY: ${{ inputs.severity }}
          TRIVY_VERSION: ${{ inputs.trivy-version }}
          IGNORE_UNFIXED: ${{ inputs.ignore-unfixed }}
        run: |
          set +e

          IGNORE_FLAG=""
          if [[ "${IGNORE_UNFIXED}" == "true" ]]; then
            IGNORE_FLAG="--ignore-unfixed"
          fi

          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            "aquasec/trivy:${TRIVY_VERSION}" \
            fs "${WORKING_DIR}" \
            --scanners "${SCANNERS}" \
            --severity "${SEVERITY}" \
            --format json \
            --output meta.json \
            --exit-code 0 \
            ${IGNORE_FLAG}

          TRIVY_EXIT=$?

          CRITICAL=0; HIGH=0
          if [[ -f meta.json ]]; then
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' meta.json 2>/dev/null || echo 0)
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' meta.json 2>/dev/null || echo 0)
          else
            echo '{"SchemaVersion":2,"ArtifactName":".","ArtifactType":"filesystem","Results":[]}' > meta.json
          fi

          echo "critical=${CRITICAL}" >> $GITHUB_OUTPUT
          echo "high=${HIGH}"         >> $GITHUB_OUTPUT
          echo "exit-code=${TRIVY_EXIT}" >> $GITHUB_OUTPUT

      - name: Determine result
        id: result
        run: |
          CRITICAL="${{ steps.trivy.outputs.critical }}"
          HIGH="${{ steps.trivy.outputs.high }}"
          EXIT_CODE_INPUT="${{ inputs.exit-code }}"

          if [[ "${EXIT_CODE_INPUT}" == "0" ]]; then
            echo "status=passed" >> $GITHUB_OUTPUT
          elif [[ "${CRITICAL}" -gt 0 || "${HIGH}" -gt 0 ]]; then
            echo "status=failed" >> $GITHUB_OUTPUT
          else
            echo "status=passed" >> $GITHUB_OUTPUT
          fi

      - name: Generate SARIF output
        if: inputs.upload-sarif == true
        env:
          WORKING_DIR: ${{ inputs.working-directory }}
          SCANNERS: ${{ inputs.scanners }}
          SEVERITY: ${{ inputs.severity }}
          TRIVY_VERSION: ${{ inputs.trivy-version }}
          IGNORE_UNFIXED: ${{ inputs.ignore-unfixed }}
        run: |
          IGNORE_FLAG=""
          if [[ "${IGNORE_UNFIXED}" == "true" ]]; then
            IGNORE_FLAG="--ignore-unfixed"
          fi

          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            "aquasec/trivy:${TRIVY_VERSION}" \
            fs "${WORKING_DIR}" \
            --scanners "${SCANNERS}" \
            --severity "${SEVERITY}" \
            --format sarif \
            --output code-scan.sarif \
            --exit-code 0 \
            ${IGNORE_FLAG} || true

      - name: Upload SARIF
        if: inputs.upload-sarif == true && hashFiles('code-scan.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: code-scan.sarif

      - name: Upload block metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-meta-code-scan
          path: meta.json
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          echo "## Code Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          STATUS="${{ steps.result.outputs.status }}"
          if [[ "${STATUS}" == "passed" ]]; then
            echo ":white_check_mark: **Scan Passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo ":x: **Scan Failed**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| CRITICAL | ${{ steps.trivy.outputs.critical }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HIGH     | ${{ steps.trivy.outputs.high }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail on findings
        if: steps.result.outputs.status == 'failed'
        run: |
          echo "Code scan found CRITICAL or HIGH severity issues."
          echo "CRITICAL: ${{ steps.trivy.outputs.critical }}, HIGH: ${{ steps.trivy.outputs.high }}"
          exit 1
