name: Helm Publish
# Reusable workflow for publishing Helm charts to OCI registries.
# Lints, updates dependencies, publishes, and generates a step summary
# with pull/install commands.
#
# Usage:
#   jobs:
#     helm:
#       uses: jacaudi/github-actions/.github/workflows/helm-publish.yml@main
#       permissions:
#         contents: read
#         packages: write
#       with:
#         chart-name: my-app

on:
  workflow_call:
    inputs:
      chart-name:
        description: 'Chart name. Defaults to repository name'
        required: false
        type: string
        default: ''
      chart-path:
        description: 'Path to the chart directory'
        required: false
        type: string
        default: 'chart'
      registry:
        description: 'OCI registry to publish to'
        required: false
        type: string
        default: 'ghcr.io'
      registry-username:
        description: 'Registry username (defaults to github.actor)'
        required: false
        type: string
        default: ''
      repository:
        description: 'Repository path for the chart (defaults to <owner>/charts)'
        required: false
        type: string
        default: ''
      version:
        description: 'Chart version (defaults to tag name with v prefix stripped)'
        required: false
        type: string
        default: ''
      app-version:
        description: 'App version for the chart (defaults to v-prefixed version)'
        required: false
        type: string
        default: ''
      update-dependencies:
        description: 'Run helm dependency update before publishing'
        required: false
        type: boolean
        default: true
      lint:
        description: 'Run helm lint before publishing'
        required: false
        type: boolean
        default: true
      runs-on:
        description: 'Runner label to use'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      registry-password:
        description: 'Registry password/token (defaults to GITHUB_TOKEN for ghcr.io)'
        required: false
    outputs:
      chart-name:
        description: 'Published chart name'
        value: ${{ jobs.publish.outputs.chart-name }}
      chart-version:
        description: 'Published chart version'
        value: ${{ jobs.publish.outputs.chart-version }}
      chart-app-version:
        description: 'Published chart app version'
        value: ${{ jobs.publish.outputs.chart-app-version }}
      chart-ref:
        description: 'Full OCI reference to the published chart'
        value: ${{ jobs.publish.outputs.chart-ref }}

jobs:
  publish:
    name: Publish Helm Chart
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      packages: write
    outputs:
      chart-name: ${{ steps.chart-info.outputs.name }}
      chart-version: ${{ steps.chart-info.outputs.version }}
      chart-app-version: ${{ steps.chart-info.outputs.app-version }}
      chart-ref: ${{ steps.chart-info.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine chart name
        id: chart-name
        run: |
          if [[ -n "${{ inputs.chart-name }}" ]]; then
            echo "name=${{ inputs.chart-name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine repository
        id: repository
        run: |
          if [[ -n "${{ inputs.repository }}" ]]; then
            echo "owner=${{ inputs.repository }}" >> $GITHUB_OUTPUT
          else
            echo "owner=${{ github.repository_owner }}/charts" >> $GITHUB_OUTPUT
          fi

      - name: Validate chart exists
        run: |
          if [[ ! -f "${{ inputs.chart-path }}/Chart.yaml" ]]; then
            echo "::error::Chart.yaml not found at ${{ inputs.chart-path }}/Chart.yaml"
            exit 1
          fi

      - name: Extract version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ -n "$GITHUB_REF_NAME" && "$GITHUB_REF_TYPE" == "tag" ]]; then
            # Strip 'v' prefix from tag for Helm version
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Fall back to version from Chart.yaml
            VERSION=$(grep '^version:' "${{ inputs.chart-path }}/Chart.yaml" | awk '{print $2}')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Verify Chart.yaml matches when triggered by tag
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            CHART_VERSION=$(grep '^version:' "${{ inputs.chart-path }}/Chart.yaml" | awk '{print $2}')
            if [[ "${CHART_VERSION}" != "${VERSION}" ]]; then
              echo "::warning::Chart.yaml version (${CHART_VERSION}) does not match tag (${VERSION})"
            fi
          fi

      - name: Determine app version
        id: app-version
        run: |
          if [[ -n "${{ inputs.app-version }}" ]]; then
            APP_VERSION="${{ inputs.app-version }}"
          else
            VERSION="${{ steps.version.outputs.version }}"
            if [[ "${VERSION}" == v* ]]; then
              APP_VERSION="${VERSION}"
            else
              APP_VERSION="v${VERSION}"
            fi
          fi
          echo "app-version=${APP_VERSION}" >> $GITHUB_OUTPUT

      - name: Helm Lint
        if: inputs.lint
        run: helm lint "${{ inputs.chart-path }}"

      - name: Update Dependencies
        if: inputs.update-dependencies
        run: helm dependency update "${{ inputs.chart-path }}"

      - name: Publish Helm Chart
        uses: appany/helm-oci-chart-releaser@v0.5.0
        with:
          name: ${{ steps.chart-name.outputs.name }}
          repository: ${{ steps.repository.outputs.owner }}
          tag: ${{ steps.version.outputs.version }}
          app_version: ${{ steps.app-version.outputs.app-version }}
          path: ${{ inputs.chart-path }}
          registry: ${{ inputs.registry }}
          registry_username: ${{ inputs.registry-username || github.actor }}
          registry_password: ${{ secrets.registry-password || github.token }}

      - name: Set chart info outputs
        id: chart-info
        run: |
          echo "name=${{ steps.chart-name.outputs.name }}" >> $GITHUB_OUTPUT
          echo "version=${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "app-version=${{ steps.app-version.outputs.app-version }}" >> $GITHUB_OUTPUT
          echo "ref=oci://${{ inputs.registry }}/${{ steps.repository.outputs.owner }}/${{ steps.chart-name.outputs.name }}:${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Generate Summary
        if: always()
        run: |
          CHART_NAME="${{ steps.chart-name.outputs.name }}"
          CHART_REPO="${{ steps.repository.outputs.owner }}"
          VERSION="${{ steps.version.outputs.version }}"
          APP_VERSION="${{ steps.app-version.outputs.app-version }}"

          echo "## Helm Chart Publishing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ job.status }}" == "success" ]]; then
            echo ":white_check_mark: **Publish Successful**" >> $GITHUB_STEP_SUMMARY
          else
            echo ":x: **Publish Failed**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Chart Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chart Name | \`${CHART_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| App Version | \`${APP_VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Chart Path | \`${{ inputs.chart-path }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`${{ inputs.registry }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | \`${CHART_REPO}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ inputs.lint }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Update Dependencies | ${{ inputs.update-dependencies }} |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull the chart:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "helm pull oci://${{ inputs.registry }}/${CHART_REPO}/${CHART_NAME} --version ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install the chart:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "helm install my-release oci://${{ inputs.registry }}/${CHART_REPO}/${CHART_NAME} --version ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Write block metadata
        if: always()
        run: |
          STATUS="passed"
          if [[ "${{ job.status }}" != "success" ]]; then STATUS="failed"; fi
          CHART_NAME="${{ steps.chart-name.outputs.name }}"
          CHART_REPO="${{ steps.repository.outputs.owner }}"
          VERSION="${{ steps.version.outputs.version }}"
          CHART_REF="oci://${{ inputs.registry }}/${CHART_REPO}/${CHART_NAME}:${VERSION}"
          jq -n \
            --arg block         "helm-publish" \
            --arg status        "${STATUS}" \
            --arg timestamp     "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg chart_name    "${CHART_NAME}" \
            --arg chart_version "${VERSION}" \
            --arg chart_ref     "${CHART_REF}" \
            --arg registry      "${{ inputs.registry }}" \
            '{ block: $block, status: $status, timestamp: $timestamp,
               chart_name: $chart_name, chart_version: $chart_version,
               chart_ref: $chart_ref, registry: $registry }' > meta.json

      - name: Upload block metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-meta-helm-publish
          path: meta.json
          retention-days: 30
