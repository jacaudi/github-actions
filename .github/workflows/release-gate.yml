name: Release Gate
# Lego block: Stage 5 — Manual Approval Gate
# Pauses the pipeline and waits for a reviewer to approve the deployment
# in the GitHub environment named by the `environment` input.
#
# Setup (once per repository):
#   GitHub repo → Settings → Environments → New environment: "release-approval"
#   → Add required reviewers
#
# Emits: pipeline-meta-release-gate artifact

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub environment name configured with required reviewers'
        required: false
        type: string
        default: 'release-approval'
      runs-on:
        description: 'Runner label'
        required: false
        type: string
        default: 'ubuntu-24.04'

    outputs:
      status:
        description: 'Gate result: approved or failed'
        value: ${{ jobs.gate.outputs.status }}

jobs:
  gate:
    name: Await Release Approval
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment }}
    outputs:
      status: ${{ steps.result.outputs.status }}
    steps:
      - name: Approval granted
        id: result
        run: |
          echo "status=approved" >> $GITHUB_OUTPUT
          echo "Release approved by a required reviewer for environment: ${{ inputs.environment }}"

      - name: Write block metadata
        if: always()
        run: |
          STATUS="approved"
          if [[ "${{ job.status }}" != "success" ]]; then
            STATUS="failed"
          fi
          jq -n \
            --arg block       "release-gate" \
            --arg status      "${STATUS}" \
            --arg timestamp   "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg environment "${{ inputs.environment }}" \
            --arg run_id      "${{ github.run_id }}" \
            --arg actor       "${{ github.actor }}" \
            --arg ref         "${{ github.ref }}" \
            --arg commit      "${{ github.sha }}" \
            '{
              block:       $block,
              status:      $status,
              timestamp:   $timestamp,
              environment: $environment,
              run_id:      $run_id,
              actor:       $actor,
              ref:         $ref,
              commit:      $commit
            }' > meta.json

      - name: Upload block metadata
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-meta-release-gate
          path: meta.json
          retention-days: 30
