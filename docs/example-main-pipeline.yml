# Main branch release pipeline
# Full pipeline: code analysis → build → test → scan → manual gate
# → semantic release → release build → test → scan → publish
name: CI/CD (Main)

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  security-events: write

jobs:
  # ── Stage 1: Code Analysis ─────────────────────────────────────────────────
  code-scan:
    uses: jacaudi/github-actions/.github/workflows/code-scan.yml@main
    with:
      severity: 'HIGH,CRITICAL'

  # ── Stage 2: Build ephemeral artifact ──────────────────────────────────────
  build-artifact:
    needs: [code-scan]
    uses: jacaudi/github-actions/.github/workflows/docker-build.yml@main
    with:
      image-name: ${{ github.repository }}
      push: true
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 3: Test artifact ─────────────────────────────────────────────────
  test-artifact:
    needs: [build-artifact]
    uses: jacaudi/github-actions/.github/workflows/image-validate.yml@main
    with:
      image-ref: ${{ needs.build-artifact.outputs.image-ref }}
      command: 'echo "Image OK"'  # replace with real smoke test

  # ── Stage 4: Scan artifact ─────────────────────────────────────────────────
  scan-artifact:
    needs: [build-artifact]
    uses: jacaudi/github-actions/.github/workflows/image-scan.yml@main
    with:
      image-ref: ${{ needs.build-artifact.outputs.image-ref }}
      severity: 'HIGH,CRITICAL'

  # ── Stage 5: Manual approval gate ──────────────────────────────────────────
  release-gate:
    needs: [test-artifact, scan-artifact]
    uses: jacaudi/github-actions/.github/workflows/release-gate.yml@main
    with:
      environment: release-approval  # configure in repo Settings → Environments

  # ── Stage 6: Semantic release (creates tag) ────────────────────────────────
  semantic-release:
    needs: [release-gate]
    uses: jacaudi/github-actions/.github/workflows/semantic-release.yml@main
    with:
      use-github-app: true
      allow-initial-development-versions: true
    secrets:
      app-id: ${{ secrets.APP_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

  # ── Stage 6b: Build release artifact (rebuilt from tag for provenance) ─────
  build-release-artifact:
    needs: [semantic-release]
    if: needs.semantic-release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/docker-build.yml@main
    with:
      image-name: ${{ github.repository }}
      version: ${{ needs.semantic-release.outputs.new-release-version }}
      push: true
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 6c: Test release artifact ───────────────────────────────────────
  test-release-artifact:
    needs: [build-release-artifact]
    if: needs.semantic-release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/image-validate.yml@main
    with:
      image-ref: ${{ needs.build-release-artifact.outputs.image-ref }}
      command: 'echo "Release image OK"'

  # ── Stage 6d: Scan release artifact ───────────────────────────────────────
  scan-release-artifact:
    needs: [build-release-artifact]
    if: needs.semantic-release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/image-scan.yml@main
    with:
      image-ref: ${{ needs.build-release-artifact.outputs.image-ref }}
      severity: 'HIGH,CRITICAL'

  # ── Stage 7 (optional): Helm publish ──────────────────────────────────────
  # Uncomment to include Helm chart publishing
  # helm-publish:
  #   needs: [test-release-artifact, scan-release-artifact]
  #   if: needs.semantic-release.outputs.new-release-published == 'true'
  #   uses: jacaudi/github-actions/.github/workflows/helm-publish.yml@main
  #   with:
  #     chart-name: myapp
  #     version: ${{ needs.semantic-release.outputs.new-release-version }}

  # ── Stage 7 (optional): Webhook notification ──────────────────────────────
  # webhook:
  #   needs: [scan-release-artifact]
  #   if: needs.semantic-release.outputs.new-release-published == 'true'
  #   uses: jacaudi/github-actions/.github/workflows/webhook.yml@main
  #   with:
  #     trigger-workflow: true
  #     trigger-repo: myorg/renovate-config
  #     trigger-workflow-id: renovate.yml
  #     release-tag: ${{ needs.semantic-release.outputs.new-release-version }}
  #   secrets:
  #     github-token: ${{ secrets.RENOVATE_TRIGGER_TOKEN }}

  # ── Always last: pipeline summary ─────────────────────────────────────────
  pipeline-summary:
    needs:
      - code-scan
      - build-artifact
      - test-artifact
      - scan-artifact
      - release-gate
      - semantic-release
      - build-release-artifact
      - test-release-artifact
      - scan-release-artifact
    if: always()
    uses: jacaudi/github-actions/.github/workflows/pipeline-summary.yml@main
