---
# Three-Stage Go Pipeline: PR Validation
# See docs/pipeline-three-stage-go.md for the full design spec.
#
# Runs on every pull request: lint, test, Helm verification, container builds.
# Nothing is pushed -- builds verify the Dockerfile compiles on each arch.
#
# Required repo variables (Settings > Variables > Actions):
#   GO_VERSION          - Go toolchain version (default: stable)
#   TEST_PACKAGES       - Go test package patterns (default: ./...)
#   TEST_ARGS           - Extra go test flags (default: empty)
#   COVERAGE_ENABLED    - Collect coverage (default: true)
#   COVERAGE_THRESHOLD  - Minimum coverage % (default: 0 = no gate)
name: PR Validation

"on":
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Lint (YAML, Helm, Go via reusable workflow) ────────────────────────────
  lint:
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@main
    permissions:
      contents: read
    with:
      yaml: true
      helm: true
      go: true
      go-version: ${{ vars.GO_VERSION || 'stable' }}
      helm-chart-path: 'chart'

  # ── Test (Go via reusable workflow) ────────────────────────────────────────
  test:
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@main
    permissions:
      contents: read
    with:
      test-framework: 'go'
      go-version: ${{ vars.GO_VERSION || 'stable' }}
      coverage: ${{ vars.COVERAGE_ENABLED != 'false' }}
      coverage-threshold: ${{ fromJSON(vars.COVERAGE_THRESHOLD || '0') }}
      test-packages: ${{ vars.TEST_PACKAGES || './...' }}
      test-args: ${{ vars.TEST_ARGS || '' }}

  # ── Verify Helm RBAC Sync (via test reusable workflow) ──────────────────────
  # Project-specific: regenerates RBAC from kubebuilder and diffs against Helm.
  # Remove or adapt this job if your project doesn't use kubebuilder RBAC gen.
  verify-helm-rbac:
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@main
    permissions:
      contents: read
    with:
      test-framework: 'custom'
      setup-command: |
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
      test-command: |
        ./hack/generate-helm-rbac.sh
        if ! git diff --exit-code chart/templates/_values-rbac.tpl; then
          echo "::error::Helm RBAC template is out of sync with config/rbac/role.yaml"
          echo "Run 'task generate-helm-rbac' and commit the changes"
          exit 1
        fi
        echo "Helm RBAC template is in sync"
      artifact-name: ''

  # ── Verify Helm CRD Sync (via test reusable workflow) ─────────────────────
  # Project-specific: regenerates CRDs from Go types and diffs against Helm.
  # Remove or adapt this job if your project doesn't use kubebuilder CRDs.
  verify-helm-crds:
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@main
    permissions:
      contents: read
    with:
      test-framework: 'custom'
      go-version: ${{ vars.GO_VERSION || 'stable' }}
      setup-command: |
        go install github.com/go-task/task/v3/cmd/task@latest
        task manifests
        task sync-helm-crds
      test-command: |
        if ! git diff --exit-code chart/crds/; then
          echo "::error::Helm chart CRDs are out of sync with generated CRDs"
          echo "Run 'task sync-helm-crds' and commit the changes"
          exit 1
        fi
        echo "Helm chart CRDs are in sync"
      artifact-name: ''

  # ── Container Build: multi-arch, no push (via reusable workflow) ───────────
  container:
    needs: [lint, test, verify-helm-rbac, verify-helm-crds]
    uses: jacaudi/github-actions/.github/workflows/component-container-build.yml@main
    permissions:
      contents: read
      packages: write
    with:
      image-name: ${{ github.repository }}
      platforms: 'linux/amd64,linux/arm64'
      push: false
